components:
  schemas:
    AssetOutputV3:
      example:
        '@context':
          '@vocab': https://w3id.org/edc/v0.0.1/ns/
        '@id': asset-id
        properties:
          key: value
        privateProperties:
          privateKey: privateValue
        dataAddress:
          type: HttpData
          baseUrl: https://jsonplaceholder.typicode.com/todos
        createdAt: 1688465655
      properties:
        '@id':
          type: string
        '@type':
          example: https://w3id.org/edc/v0.0.1/ns/Asset
          type: string
        createdAt:
          format: int64
          type: integer
        dataAddress:
          $ref: "#/components/schemas/DataAddress"
        privateProperties:
          additionalProperties: true
          type: object
        properties:
          additionalProperties: true
          type: object
      type: object
    DataAddress:
      additionalProperties: true
      properties:
        '@type':
          example: https://w3id.org/edc/v0.0.1/ns/DataAddress
          type: string
        type:
          type: string
      type: object
    Properties:
      additionalProperties: true
      type: object
    ApiErrorDetail:
      example:
        message: error message
        type: ErrorType
        path: object.error.path
        invalidValue: this value is not valid
      properties:
        invalidValue:
          type: string
