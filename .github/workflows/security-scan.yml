name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - connector-inmemory
          - connector-vault-postgresql
          - connector-vault-postgresql-edp
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull ${{ matrix.image }} image
        run: docker pull ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest

      - name: Trivy scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          format: table
          output: trivy-${{ matrix.image }}.txt
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.txt
