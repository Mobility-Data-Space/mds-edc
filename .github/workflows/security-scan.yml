name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - connector-inmemory
          - connector-inmemory-dcp
          - connector-vault-postgresql
          - connector-vault-postgresql-dcp
          - connector-vault-postgresql-edp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull ${{ matrix.image }} image
        run: docker pull ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest

      - name: Trivy scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          format: table
          output: trivy-${{ matrix.image }}.txt
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload scan report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.txt
