name: Build and Publish Maven artifacts and Docker Images

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - "*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: set gradle project version if publish from tag
        if: github.ref_type == 'tag'
        run: |
          version=${{ github.ref_name }}
          clean_version=`echo ${version} | cut -c 2-`
          sed -i 's#^version=.*#version='${clean_version}'#g' gradle.properties

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build
        run: ./gradlew build
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ github.token }}

      - uses: ./.github/actions/publish-docker-image
        with:
          runtime: connector-inmemory
          image-title: MDS EDC In Memory
          image-description: MDS EDC In Memory for development purposes.

      - uses: ./.github/actions/publish-docker-image
        with:
          runtime: connector-inmemory-dcp
          image-title: MDS EDC In Memory DCP
          image-description: MDS EDC In Memory DCP for development purposes.

      - uses: ./.github/actions/publish-docker-image
        with:
          runtime: connector-vault-postgresql
          image-title: MDS EDC
          image-description: MDS EDC Vault Postgresql connector for production use.

      - uses: ./.github/actions/publish-docker-image
        with:
          runtime: connector-vault-postgresql-dcp
          image-title: MDS EDC Vault Postgresql DCP
          image-description: MDS EDC Vault Postgresql DCP for production use.

      - uses: ./.github/actions/publish-docker-image
        with:
          runtime: connector-vault-postgresql-edp
          image-title: MDS EDC EDP Experimental
          image-description: MDS EDC connector with EDP extension for production use.

      - name: Publish Maven Artifacts
        run: ./gradlew publish
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ github.token }}
