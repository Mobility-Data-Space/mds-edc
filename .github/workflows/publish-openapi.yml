name: Build and Publish openapi specs to GH pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - "*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-jdk

      - name: Generate extensions OpenApi specs
        run: | 
          ./gradlew resolve
          ./gradlew openApiGenerate
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ github.token }}

      - run: |
          if [[ "${{ github.ref.type }}" == "tag" ]]; then
            version=${{ github.ref_name }}
          else
            version=latest  
          fi
          
          launchers=($(cd launchers && ls */ -d | grep -v "base-connector"))
          
          for launcher in "${launchers[@]}"
          do
            mkdir -p public/openapi/${launcher}latest && cp launchers/${launcher}build/generated/openapi/openapi.yaml "$_"
          done

      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
