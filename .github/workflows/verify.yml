name: verify pull request

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        target: [build, daps, dcp, tck]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-jdk

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: gradle ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" == "build" ]; then
            ./gradlew build
          else
            ./gradlew slowTests -Ptags=${{ matrix.target }}
          fi
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ github.token }}

